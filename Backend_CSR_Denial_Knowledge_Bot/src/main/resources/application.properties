# MySQL Database Configuration (Aiven Cloud)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/denial_bot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 Console
spring.h2.console.enabled=false

# Server Port
server.port=8081

# NVIDIA NIM / OpenAI-compatible LLM configuration
# Set NVIDIA_API_KEY in your local environment; do not commit real keys.
smart.recommendation.use-llm=${SMART_RECOMMENDATION_USE_LLM:true}
smart.llm.api.url=${NVIDIA_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
smart.llm.api.key=${NVIDIA_API_KEY:}
smart.llm.model=${NVIDIA_LLM_MODEL:nvidia/nemotron-3-super-120b-a12b}
smart.llm.temperature=${NVIDIA_LLM_TEMPERATURE:1}
smart.llm.top-p=${NVIDIA_LLM_TOP_P:0.95}
smart.llm.max-tokens=${NVIDIA_LLM_MAX_TOKENS:16384}
smart.llm.enable-thinking=${NVIDIA_LLM_ENABLE_THINKING:true}
smart.llm.reasoning-budget=${NVIDIA_LLM_REASONING_BUDGET:16384}
